name: Build Multi-Arch Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  # 任务 A：构建 Tunnel 专用镜像
  build-tunnel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Tunnel
        uses: docker/build-push-action@v5
        with:
          context: ./xray-tunnel
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/xray-tunnel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 任务 B：构建 Docker 配合 NPM 镜像
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker-Xray
        uses: docker/build-push-action@v5
        with:
          context: ./xray-docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/xray-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
